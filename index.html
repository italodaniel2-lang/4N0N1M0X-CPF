<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Sequência CPF</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 40px 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        
        .header-container { text-align: center; margin-bottom: 20px; }
        h3 { color: #1a1a1a; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { color: #7f8c8d; font-size: 12px; font-weight: bold; margin-top: 5px; display: block; letter-spacing: 2px; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .full-width { grid-column: span 2; }
        input { padding: 12px; border: 2px solid #e1e4e8; border-radius: 8px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; width: 100%; box-sizing: border-box; }
        input:focus { border-color: #3498db; background: #f7fbff; }
        .label-input { font-size: 12px; color: #586069; margin-bottom: 6px; display: block; font-weight: 600; text-transform: uppercase; text-align: center; }
        
        #lista-resultados { margin-top: 20px; max-height: 350px; overflow-y: auto; border: 1px solid #e1e4e8; border-radius: 8px; background: #fafbfc; }
        .item-cpf { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #edf0f2; transition: 0.2s; position: relative; }
        .item-cpf:hover { background: #fff; }
        
        /* Ponto Verde de Copiado */
        .check-icon { width: 8px; height: 8px; background-color: #2ecc71; border-radius: 50%; position: absolute; left: 4px; display: none; box-shadow: 0 0 5px rgba(46, 204, 113, 0.5); }
        .item-cpf.copiado .check-icon { display: block; }

        .cpf-texto { font-family: 'Courier New', monospace; font-size: 19px; color: #24292e; letter-spacing: 1px; margin-left: 5px; }
        .dv { color: #28a745; font-weight: bold; }
        
        .btn-gerar { width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-gerar:hover { background: #27ae60; transform: translateY(-1px); }
        .btn-copy { background: #f1f3f5; border: 1px solid #ced4da; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; transition: 0.2s; min-width: 65px; }
        .btn-copy:hover { background: #e9ecef; border-color: #adb5bd; }

        #erro { color: #d73a49; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-container">
        <h3>GERADOR CPF</h3>
        <span class="subtitle">4N0N1M0X</span>
    </div>
    
    <div class="grid-inputs">
        <div>
            <input type="text" id="inicio" maxlength="3" placeholder="inicio">
        </div>
        <div>
            <input type="text" id="fim" maxlength="3" placeholder="fim">
        </div>
        <div class="full-width">
            <span class="label-input">Número Fixo</span>
            <input type="text" id="corpo" maxlength="6" placeholder="000000">
        </div>
    </div>

    <button class="btn-gerar" onclick="gerarSequencia()">GERAR SEQUÊNCIA</button>
    
    <div id="erro"></div>
    <div id="lista-resultados"></div>
</div>

<script>
function calcularDV(num9) {
    let n = num9.split('').map(Number);
    let s1 = 0;
    for (let i = 0; i < 9; i++) s1 += n[i] * (10 - i);
    let dv1 = (s1 % 11 < 2) ? 0 : 11 - (s1 % 11);
    
    let n2 = [...n, dv1];
    let s2 = 0;
    for (let i = 0; i < 10; i++) s2 += n2[i] * (11 - i);
    let dv2 = (s2 % 11 < 2) ? 0 : 11 - (s2 % 11);
    return `${dv1}${dv2}`;
}

async function copiarTexto(texto, btn) {
    try {
        await navigator.clipboard.writeText(texto);
        
        // Adiciona classe "copiado" ao container pai
        btn.parentElement.classList.add('copiado');
        
        const originalText = btn.innerText;
        btn.innerText = "OK!";
        btn.style.background = "#d4edda";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#f1f3f5";
        }, 800);
    } catch (err) {
        console.error("Erro ao copiar");
    }
}

function gerarSequencia() {
    const listaDiv = document.getElementById('lista-resultados');
    const erroDiv = document.getElementById('erro');
    const corpo = document.getElementById('corpo').value;
    
    let inicioVal = document.getElementById('inicio').value;
    let fimVal = document.getElementById('fim').value;

    let inicio = parseInt(inicioVal);
    if (isNaN(inicio)) inicio = 0;
    
    let fim = parseInt(fimVal);
    if (isNaN(fim)) fim = 0;

    listaDiv.innerHTML = "";
    erroDiv.innerText = "";

    if (corpo.length !== 6 || isNaN(corpo)) {
        erroDiv.innerText = "O Número Fixo deve ter 6 dígitos.";
        return;
    }

    if (inicio > fim) {
        erroDiv.innerText = "Início não pode ser maior que o fim.";
        return;
    }

    for (let i = inicio; i <= fim; i++) {
        let p = i.toString().padStart(3, '0');
        let num9 = p + corpo;
        let dv = calcularDV(num9);
        let cpfLimpo = `${p}${corpo}${dv}`;

        let item = document.createElement('div');
        item.className = 'item-cpf';
        item.innerHTML = `
            <div class="check-icon"></div>
            <span class="cpf-texto">${p}.${corpo.substring(0,3)}.${corpo.substring(3,6)}-<span class="dv">${dv}</span></span>
            <button class="btn-copy" onclick="copiarTexto('${cpfLimpo}', this)">Copiar</button>
        `;
        listaDiv.appendChild(item);
    }
}
</script>

</body>
</html>
